spring:
  application:
    name: ecommerce-api

  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce
    username: ecommerce
    password: ecommerce

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    username: ecommerce
    password: ecommerce

server:
  port: 8080

app:
  jwt:
    secret: "change-this-to-a-256-bit-secret-in-production"
    expiration-ms: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
